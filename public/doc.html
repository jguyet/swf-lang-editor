<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Documentation — Dofus 1.29 Lang</title>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-actionscript.min.js"></script>
<script src="/i18n.js"></script>
<style>
  :root {
    --bg: #1e1f22;
    --sidebar-bg: #181a1d;
    --text: #ddd;
    --text-muted: #999;
    --accent: #3573e8;
    --border: #2a2d31;
    --card-bg: #22252a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font: 14px/1.7 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }
  .doc-sidebar {
    width: 300px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    height: 100vh;
    position: fixed;
    overflow-y: auto;
    padding: 20px 12px;
    display: flex;
    flex-direction: column;
  }
  .doc-sidebar-header {
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .doc-sidebar-header h2 {
    font-size: 14px;
    color: #fff;
    margin-bottom: 8px;
  }
  .doc-sidebar-header .back-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .doc-sidebar-header .back-link:hover { text-decoration: underline; }
  .doc-sidebar-header .lang-flags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .doc-sidebar-header .lang-flags button {
    background: #2a2d31;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }
  .doc-sidebar-header .lang-flags button.active {
    border-color: var(--accent);
    background: rgba(53, 115, 232, 0.15);
  }
  .doc-sidebar-header .lang-flags button:hover { border-color: var(--accent); }
  .doc-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
  .doc-nav a {
    display: block;
    padding: 6px 10px;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: 6px;
    font-size: 12px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .doc-nav a:hover { color: #fff; background: rgba(255,255,255,0.03); }
  .doc-nav a.active { color: #fff; background: rgba(53,115,232,0.12); border-left-color: var(--accent); }
  .doc-content {
    flex: 1;
    margin-left: 300px;
    padding: 40px 48px;
    max-width: 960px;
    min-height: 100vh;
  }
  .doc-content h1 { font-size: 2rem; color: #fff; margin-bottom: 1rem; }
  .doc-content h2 { font-size: 1.5rem; color: #fff; margin-top: 2.5rem; margin-bottom: 0.8rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .doc-content h3 { font-size: 1.15rem; color: #e5e7eb; margin-top: 1.5rem; margin-bottom: 0.6rem; }
  .doc-content p, .doc-content li { margin-bottom: 0.8rem; line-height: 1.7; }
  .doc-content ul, .doc-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .doc-content li::marker { color: var(--accent); }
  .doc-content code {
    font-family: 'SF Mono', Menlo, monospace;
    background: rgba(255,255,255,0.08);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    font-size: 0.85em;
    color: #6cb6ff;
  }
  .doc-content pre {
    background: #0d1117 !important;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px !important;
    overflow-x: auto;
    margin: 1.2rem 0;
  }
  .doc-content pre code { background: none; padding: 0; color: inherit; font-size: 0.9em; }
  .doc-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin: 1rem 0;
    background: rgba(53,115,232,0.06);
    border-radius: 0 6px 6px 0;
    color: #bbb;
    font-style: italic;
  }
  .doc-content blockquote p:last-child { margin-bottom: 0; }
  .doc-content hr { border: 0; height: 1px; background: var(--border); margin: 2rem 0; }
  .table-wrapper {
    width: 100%;
    overflow-x: auto;
    margin: 1.2rem 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
  }
  .doc-content table { width: 100%; border-collapse: collapse; }
  .doc-content th, .doc-content td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
  .doc-content th { background: rgba(255,255,255,0.02); color: #fff; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  .doc-content tr:last-child td { border-bottom: 0; }
  .doc-content tr:hover td { background: rgba(255,255,255,0.02); }
  .doc-content a { color: #6cb6ff; text-decoration: none; }
  .doc-content a:hover { text-decoration: underline; }
  #loading { padding: 40px; color: var(--text-muted); text-align: center; }
  @media (max-width: 800px) {
    .doc-sidebar { display: none; }
    .doc-content { margin-left: 0; padding: 20px 16px; }
  }
</style>
</head>
<body>
<aside class="doc-sidebar">
  <div class="doc-sidebar-header">
    <h2 id="docSidebarTitle">Dofus 1.29 — Lang</h2>
    <a href="/" class="back-link" id="backLink"></a>
    <div class="lang-flags" id="docLangFlags"></div>
  </div>
  <nav class="doc-nav" id="docNav"></nav>
</aside>
<main class="doc-content" id="docContent">
  <div id="loading"></div>
</main>
<script>
  function initPage() {
    document.title = i18n.t('doc.title');
    document.getElementById('backLink').textContent = i18n.t('doc.backToEditor');
    document.getElementById('loading').textContent = i18n.t('doc.loading');
    renderDocFlags();
  }

  function renderDocFlags() {
    const container = document.getElementById('docLangFlags');
    container.innerHTML = '';
    for (const lang of i18n.SUPPORTED_LANGS) {
      const btn = document.createElement('button');
      btn.textContent = i18n.FLAGS[lang];
      btn.title = lang.toUpperCase();
      if (lang === i18n.getLang()) btn.classList.add('active');
      btn.onclick = () => {
        i18n.setLang(lang);
        initPage();
      };
      container.appendChild(btn);
    }
  }

  async function loadDoc() {
    try {
      const res = await fetch('/api/doc');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);

      marked.setOptions({ gfm: true, breaks: true, headerIds: true });
      const renderer = new marked.Renderer();
      renderer.table = function(header, body) {
        return '<div class="table-wrapper"><table><thead>' + header + '</thead><tbody>' + body + '</tbody></table></div>';
      };

      const html = marked.parse(data.markdown, { renderer });
      document.getElementById('docContent').innerHTML = html;

      const nav = document.getElementById('docNav');
      const headers = document.querySelectorAll('#docContent h2');
      headers.forEach((h, i) => {
        if (!h.id) h.id = 'doc-section-' + i;
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/^[0-9.]+\s*/, '');
        a.onclick = () => {
          document.querySelectorAll('.doc-nav a').forEach(l => l.classList.remove('active'));
          a.classList.add('active');
        };
        nav.appendChild(a);
      });

      const observer = new IntersectionObserver(entries => {
        let activeId = null;
        entries.forEach(e => { if (e.isIntersecting) activeId = e.target.id; });
        if (activeId) {
          document.querySelectorAll('.doc-nav a').forEach(l => {
            l.classList.remove('active');
            if (l.getAttribute('href') === '#' + activeId) l.classList.add('active');
          });
        }
      }, { rootMargin: '0px 0px -60% 0px', threshold: 0 });
      headers.forEach(h => observer.observe(h));

      Prism.highlightAll();
    } catch (e) {
      document.getElementById('docContent').innerHTML =
        '<p style="color:#ff7676">' + i18n.t('doc.error') + ' ' + e.message + '</p>';
    }
  }

  initPage();
  loadDoc();
</script>
</body>
</html>
